  flutter_bloc: ^9.1.1
  flutter_email_sender: ^8.0.0
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.7+1
  flutter_translate:
    git:
      url: https://github.com/Javernaver/flutter_translate.git
